<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Admin Panel{% endblock %}</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f6f7fb;
            color: #111827;
        }

        .admin-sidebar {
            width: 270px;
            height: 100vh;
            background: linear-gradient(180deg, #111827, #450a0a);
            position: fixed;
            top: 0;
            left: 0;
            color: white;
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
        }

        .admin-logo {
            text-align: center;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            margin-bottom: 25px;
        }

        .admin-logo h2 {
            margin: 0;
            font-size: 22px;
            color: #fca5a5;
        }

        .admin-logo small {
            display: block;
            margin-top: 8px;
            color: #fecaca;
            letter-spacing: 1px;
        }

        .menu-title {
            font-size: 12px;
            color: #d1d5db;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 18px 0 8px 10px;
        }

        .admin-nav {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
        }

        .admin-nav li {
            margin-bottom: 8px;
        }

        .admin-nav a,
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #f3f4f6;
            text-decoration: none;
            padding: 13px 15px;
            border-radius: 12px;
            transition: 0.3s;
            font-size: 15px;
            border: none;
            background: transparent;
            width: 100%;
            cursor: pointer;
            text-align: left;
        }

        .admin-nav a:hover {
            background: #dc2626;
            color: white;
        }

        .admin-nav i {
            width: 20px;
            text-align: center;
        }

        .logout-area {
            border-top: 1px solid rgba(255,255,255,0.15);
            padding-top: 18px;
        }

        .logout-btn {
            background: #dc2626;
            font-weight: bold;
        }

        .logout-btn:hover {
            background: #991b1b;
        }

        .admin-content {
            margin-left: 270px;
            min-height: 100vh;
            padding: 35px;
        }

        .topbar {
            background: white;
            padding: 18px 25px;
            border-radius: 18px;
            box-shadow: 0 5px 18px rgba(0,0,0,0.06);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar h3 {
            margin: 0;
        }

        .welcome {
            color: #6b7280;
            font-weight: 600;
        }

        .admin-badge {
            background: #dc2626;
            color: white;
            padding: 6px 12px;
            border-radius: 999px;
            font-weight: bold;
            font-size: 12px;
            margin-right: 10px;
        }
    </style>
</head>

<body>

<div class="admin-sidebar">

    <div class="admin-logo">
        <h2><i class="fas fa-shield-alt"></i> Smart Campus</h2>
        <small>ADMIN PANEL</small>
    </div>

    <ul class="admin-nav">

        <div class="menu-title">Administration</div>

        <li>
            <a href="{% url 'admin_dashboard' %}">
                <i class="fas fa-chart-line"></i>
                Dashboard
            </a>
        </li>

        <li>
            <a href="{% url 'admin_user_management' %}">
                <i class="fas fa-users-cog"></i>
                User Management
            </a>
        </li>

        <li>
            <a href="{% url 'admin_event_approval' %}">
                <i class="fas fa-tasks"></i>
                Event Approvals
            </a>
        </li>

        <li>
            <a href="{% url 'manage_staff_applications' %}">
                <i class="fas fa-user-check"></i>
                Staff Applications
            </a>
        </li>

        <div class="menu-title">System</div>

        <li>
            <a href="{% url 'admin_announcements' %}">
                <i class="fas fa-bullhorn"></i>
                Announcements
            </a>
        </li>

    </ul>

    <div class="logout-area">
        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
                Logout
            </button>
        </form>
    </div>

</div>

<div class="admin-content">

    <div class="topbar">
        <h3>{% block page_title %}Admin Dashboard{% endblock %}</h3>

        <div class="welcome">
            <span class="admin-badge">ADMIN</span>
            Welcome, {{ user.username }}
        </div>
    </div>

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
