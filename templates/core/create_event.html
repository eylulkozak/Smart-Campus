{% extends 'core/staff_base.html' %}

{% block title %}Create Event{% endblock %}
{% block page_title %}Create New Event{% endblock %}

{% block content %}

<div class="form-wrapper">

    <div class="form-card">

        <div class="form-header">
            <div>
                <h3>Create New Event</h3>
                <p>Fill in the details below to create a campus event.</p>
            </div>

            <i class="fas fa-calendar-plus"></i>
        </div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-area">
                {{ form.as_p }}
            </div>

            <div class="button-row">
                <a href="{% url 'staff_dashboard' %}" class="cancel-btn">
                    Cancel
                </a>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-paper-plane"></i>
                    Submit Event
                </button>
            </div>

        </form>

    </div>

</div>

<style>
    .form-wrapper {
        display: flex;
        justify-content: center;
    }

    .form-card {
        width: 100%;
        max-width: 850px;
        background: white;
        border-radius: 24px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.07);
        padding: 32px;
    }

    .form-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 28px;
        padding-bottom: 20px;
        border-bottom: 1px solid #e5e7eb;
    }

    .form-header h3 {
        margin: 0;
        font-size: 26px;
        color: #111827;
    }

    .form-header p {
        margin: 6px 0 0;
        color: #6b7280;
    }

    .form-header i {
        font-size: 34px;
        color: #7c3aed;
        background: #ede9fe;
        padding: 18px;
        border-radius: 18px;
    }

    .form-area p {
        margin-bottom: 20px;
    }

    .form-area label {
        display: block;
        font-weight: 700;
        color: #374151;
        margin-bottom: 8px;
    }

    .form-area input,
    .form-area textarea,
    .form-area select {
        width: 100%;
        padding: 13px 14px;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        font-size: 15px;
        outline: none;
        transition: 0.2s;
    }

    .form-area input:focus,
    .form-area textarea:focus,
    .form-area select:focus {
        border-color: #7c3aed;
        box-shadow: 0 0 0 3px #ede9fe;
    }

    .button-row {
        display: flex;
        justify-content: flex-end;
        gap: 14px;
        margin-top: 28px;
        padding-top: 22px;
        border-top: 1px solid #e5e7eb;
    }

    .cancel-btn {
        text-decoration: none;
        padding: 13px 22px;
        border-radius: 12px;
        background: #f3f4f6;
        color: #374151;
        font-weight: bold;
    }

    .cancel-btn:hover {
        background: #e5e7eb;
    }

    .submit-btn {
        border: none;
        padding: 13px 22px;
        border-radius: 12px;
        background: #7c3aed;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    .submit-btn:hover {
        background: #6d28d9;
    }
</style>

{% endblock %}
